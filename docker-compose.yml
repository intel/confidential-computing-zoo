version: '3.8'

services:
  tc-api:
    build:
      context: .
      args:
        - http_proxy=${http_proxy:-}
        - https_proxy=${https_proxy:-}
        - no_proxy=${no_proxy:-}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
        - ENABLE_TDX=${ENABLE_TDX:-false}
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=false
      - DOCKER_REGISTRY=docker.io
      - DOCKER_REPOSITORY=myrepo
      - ENABLE_TDX=${ENABLE_TDX:-false}
      - TRUCON_URL=http://trucon:8001
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - no_proxy=${no_proxy:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
    volumes:
      - ./uploads:/app/uploads
      - ./builds:/app/builds
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket for building images
    tmpfs:
      - /dev/shm
    mem_swappiness: 0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - trucon

  trucon:
    build:
      context: .
      args:
        - http_proxy=${http_proxy:-}
        - https_proxy=${https_proxy:-}
        - no_proxy=${no_proxy:-}
    command: ["python", "-m", "uvicorn", "trucon:app", "--host", "0.0.0.0", "--port", "8001", "--workers", "1"]
    ports:
      - "8001:8001"
    environment:
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - no_proxy=${no_proxy:-}
    volumes:
      - ./logs:/app/logs
    tmpfs:
      - /dev/shm
    mem_swappiness: 0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Optional: Add a reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - tc-api
    restart: unless-stopped
