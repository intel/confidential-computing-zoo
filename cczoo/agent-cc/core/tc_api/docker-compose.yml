version: '3.8'

services:
  tc_api:
    build:
      context: ..
      dockerfile: tc_api/Dockerfile
      args:
        - http_proxy=${http_proxy:-}
        - https_proxy=${https_proxy:-}
        - no_proxy=${no_proxy:-}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=false
      - DOCKER_REGISTRY=docker.io
      - DOCKER_REPOSITORY=myrepo
      - TRUCON_URL=http://trucon:8001
      - TRUCON_UDS_PATH=/var/run/trucon/trucon.sock
      - TRUCON_SERVICE_TOKEN=${TRUCON_SERVICE_TOKEN}
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - no_proxy=${no_proxy:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
    volumes:
      - ./uploads:/app/tc_api/uploads
      - ./builds:/app/tc_api/builds
      - ./logs:/app/tc_api/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/trucon:/var/run/trucon
    tmpfs:
      - /dev/shm
    mem_swappiness: 0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - trucon

  trucon:
    build:
      context: ..
      dockerfile: tc_api/Dockerfile
      args:
        - http_proxy=${http_proxy:-}
        - https_proxy=${https_proxy:-}
        - no_proxy=${no_proxy:-}
    command: ["python", "-m", "uvicorn", "tc_api.trucon.app:app", "--host", "0.0.0.0", "--port", "8001", "--workers", "1"]
    ports:
      - "8001:8001"
    environment:
      - TRUCON_UDS_PATH=/var/run/trucon/trucon.sock
      - TRUCON_SERVICE_TOKEN=${TRUCON_SERVICE_TOKEN}
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - no_proxy=${no_proxy:-}
    volumes:
      - ./logs:/app/tc_api/logs
      - /var/run/trucon:/var/run/trucon
    tmpfs:
      - /dev/shm
    mem_swappiness: 0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H \"Authorization: Bearer $$TRUCON_SERVICE_TOKEN\" http://localhost:8001/status >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  docktap:
    build:
      context: ..
      dockerfile: tc_api/Dockerfile
      args:
        - http_proxy=${http_proxy:-}
        - https_proxy=${https_proxy:-}
        - no_proxy=${no_proxy:-}
    command: ["/app/venv/bin/python", "-m", "tc_api.docktap.main", "--socket-path", "/var/run/docktap/docker.sock", "--docker-socket-path", "/var/run/docker-daemon.sock"]
    ports:
      - "8002:8002"
    environment:
      - TRUCON_URL=http://trucon:8001
      - TRUCON_UDS_PATH=/var/run/trucon/trucon.sock
      - TRUCON_SERVICE_TOKEN=${TRUCON_SERVICE_TOKEN}
      - DOCKER_SOCKET=/var/run/docker-daemon.sock
      - SOCK_BRIDGE_SOCKET=/var/run/docktap/docker.sock
      - DOCKTAP_AUTH_MODE=${DOCKTAP_AUTH_MODE:-explicit_delegation}
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - no_proxy=${no_proxy:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker-daemon.sock
      - /var/run/docktap:/var/run/docktap
      - /var/run/trucon:/var/run/trucon
      - ./logs:/app/tc_api/logs
    tmpfs:
      - /dev/shm
    mem_swappiness: 0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      trucon:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - tc_api
    restart: unless-stopped