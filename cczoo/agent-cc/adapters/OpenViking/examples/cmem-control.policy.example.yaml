# Documentation-only example policy shape for OpenViking/OpenClaw integration.
# This file is not loaded by any runtime in this change.

policy_id: openviking-context-send
policy_version: "2026-05-25"
default_result: deny
fail_closed: true

subjects:
  allowed_agents:
    - openclaw

evidence:
  require_attested_head: true
  allowed_tee_types:
    - tdx
  max_age_seconds: 300
  require_ledger_head_binding: true

operations:
  send_context:
    require_verified_evidence: true
    decision_event: openviking.context_send.allow

  recall:
    require_verified_evidence: true
    allowed_payload_classes:
      - memory-summary
      - session-summary

  materialize:
    require_verified_evidence: true
    require_lease: true
    allowed_payload_classes:
      - archive-reference
      - content-reference
    deny_plaintext_gateway: true

  privacy_restore:
    require_verified_evidence: true
    require_confidential_boundary: true
    require_lease: true

  egress:
    default_result: deny
    allow_destinations: []

ledger:
  record_decisions: true
  plaintext_logged: false
  include_fields:
    - operation
    - result
    - policy_id
    - policy_version
    - subject_agent
    - workspace_hash
    - resource_scope_hash
    - evidence_digest
    - payload_class
    - payload_digest
    - denial_reason